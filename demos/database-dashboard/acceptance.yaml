schema_version: 1.0.0
visibility: public
episode_id: database-dashboard
target: libreoffice
target_version: 26.2.4.2
expected_restrictions:
  - Database access is limited to the supplied fixture and granted connection.
  - Credentials are injected at runtime and never written into workbook values or evidence.
scenarios:
  - scenario_id: refresh-dashboard
    title: Dashboard refresh reads the portable database
    feature: database-refresh
    action: Load the supplied schema and seed data, then invoke the dashboard refresh control.
    assertions:
      - The result table rows match the supplied database records in stable order.
      - Dashboard formula values recalculate from the refreshed row values.
  - scenario_id: replace-adodb
    title: ADODB and Access dependencies are absent
    feature: adodb-replacement
    action: Inspect and run the migrated refresh path using the declared SQLite or PostgreSQL adapter.
    assertions:
      - The refresh result contains the same public records without ADODB or Access controls.
      - Missing database capability returns an explicit unavailable result instead of stale values.
  - scenario_id: parameterized-filter
    title: User filters are parameterized
    feature: parameterized-query
    action: Enter the public region filter and then enter a SQL metacharacter string.
    assertions:
      - The public filter returns only matching record rows.
      - The metacharacter input remains a value and cannot alter the query or database state.
