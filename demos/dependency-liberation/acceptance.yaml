schema_version: 1.0.0
visibility: public
episode_id: dependency-liberation
target: libreoffice
target_version: 26.2.4.2
expected_restrictions:
  - No Outlook, ActiveX, WScript, PowerShell, Windows path, or host process dependency remains.
  - Portable services are explicit capabilities and default to denied.
scenarios:
  - scenario_id: office-dependency-map
    title: Windows and Office dependencies are completely mapped
    feature: dependency-inventory
    action: Compare supplied source modules with the migration dependency dossier.
    assertions:
      - Every COM control, Windows path, process, and database call has a disposition.
      - No dependency result is hidden behind a generic success message.
  - scenario_id: portable-workflow
    title: Portable replacements complete the workflow
    feature: portable-services
    action: Create the public invoice, refresh its data, export PDF, and produce a message artifact.
    assertions:
      - Result values match the public invoice and database fixture records.
      - PDF and message outputs are created without Windows or Office controls.
  - scenario_id: denied-capability
    title: Missing capabilities fail closed
    feature: capability-denial
    action: Repeat the workflow with database and message capabilities denied.
    assertions:
      - Each denied operation returns an explicit unavailable result.
      - No process, network, or file output occurs outside the granted artifact directory.
