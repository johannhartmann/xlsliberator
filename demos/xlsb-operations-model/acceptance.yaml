schema_version: 1.0.0
visibility: public
episode_id: xlsb-operations-model
target: libreoffice
target_version: 26.2.4.2
expected_restrictions:
  - XLSB parsing is isolated from LibreOffice execution.
  - Unknown binary records are preserved or explicitly accounted for.
scenarios:
  - scenario_id: binary-inventory
    title: XLSB operational structures are inventoried
    feature: xlsb-import
    action: Inventory worksheets, formulas, comments, charts, drawings, and VBA package parts.
    assertions:
      - The inventory result records each public structure and its source package part.
      - Unknown record values are reported without a generic parser failure.
  - scenario_id: chart-and-comments
    title: Chart and comment semantics survive migration
    feature: drawings-comments
    action: Open the target, inspect the public chart series and comment, save, close, and reopen.
    assertions:
      - Chart series formula values and comment text match the public source inventory.
      - Drawing state and comment values remain present after reopen.
  - scenario_id: binary-vba-accounting
    title: Embedded VBA has an explicit disposition
    feature: vba-accounting
    action: Compare the source VBA inventory with the migration dossier and target behavior.
    assertions:
      - Every module and event has a result disposition and replacement reference.
      - Unsupported behavior produces an explicit unavailable or unsupported result.
