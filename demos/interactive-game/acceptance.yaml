schema_version: 1.0.0
visibility: public
episode_id: interactive-game
target: libreoffice
target_version: 26.2.4.2
expected_restrictions:
  - No Windows API, host process, or host sound-device access.
  - No timing loop may block the LibreOffice UI thread.
scenarios:
  - scenario_id: keyboard-control
    title: Keyboard input moves and rotates the active piece
    feature: keyboard-input
    action: Start a game, send left, right, down, and rotate input through the declared control surface.
    assertions:
      - The active piece state changes exactly once for each valid input.
      - The board value remains unchanged for an input that would cross a wall.
  - scenario_id: timer-tick
    title: Timer advances game state without freezing the UI
    feature: timer-loop
    action: Start a game and allow three declared timer ticks while also invoking a UI control.
    assertions:
      - The falling-piece row value advances on every eligible timer event.
      - The control event is processed before the third tick and the UI state remains responsive.
  - scenario_id: native-controls
    title: Start pause and reset controls remain functional
    feature: controls
    action: Invoke start, pause, resume, and reset using the migrated LibreOffice controls.
    assertions:
      - Each control event produces the documented game-state transition.
      - Reset restores score and board values without reopening the document.
  - scenario_id: document-events
    title: Document events initialize and persist the game
    feature: events
    action: Open, play one move, save, close, and reopen the migrated workbook.
    assertions:
      - The open event initializes controls without duplicate event bindings.
      - The saved game state and high-score value survive reopen.
  - scenario_id: line-collapse
    title: Completing a line updates board and score
    feature: game-state
    action: Load the public near-complete board state and place the final piece.
    assertions:
      - The completed row is removed and upper row values move down once.
      - The score value increases by the public scoring rule.
