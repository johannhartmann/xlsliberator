services:
  test:
    image: xlsliberator-test:py311
    build:
      context: .
      dockerfile: docker/test/Dockerfile
    environment:
      HOME: /tmp/home
      PYTHONPATH: /workspace/src
      XLSLIBERATOR_APPLICATION_CONTAINER: "1"
      XLSLIBERATOR_OFFICE_CONTAINER: "0"
    volumes:
      - .:/workspace
    network_mode: none
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=1g,mode=1777,uid=10001,gid=10001
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 256
    mem_limit: 2g
    cpus: 2

  # Trusted CI orchestration boundary. This service may talk to the Docker
  # daemon so that pytest can create disposable office containers; workbook
  # and office runtime containers never receive the socket.
  test-orchestrator:
    extends: test
    user: "0:0"
    working_dir: ${PWD}
    environment:
      HOME: /tmp/home
      PYTHONPATH: ${PWD}/src
      XLSLIBERATOR_APPLICATION_CONTAINER: "1"
      XLSLIBERATOR_OFFICE_CONTAINER: "0"
      XLSLIBERATOR_RUNTIME_TEMP_ROOT: ${PWD}/artifacts/runtime-tmp
      XLSLIBERATOR_WORKSPACE_ROOTS: ${PWD}:/tmp/pytest-tmp
      PYTEST_ADDOPTS: --basetemp=/tmp/pytest-tmp
    volumes:
      - .:${PWD}
      - /var/run/docker.sock:/var/run/docker.sock
    profiles:
      - ci-orchestrator

  # Trusted dependency-audit boundary. Advisory lookup needs outbound HTTPS,
  # but this service receives neither the Docker socket nor office execution.
  security-audit:
    extends: test
    network_mode: bridge
    profiles:
      - ci-orchestrator

  libreoffice-runtime:
    image: xlsliberator-libreoffice:26.2.4.2
    build:
      context: .
      dockerfile: docker/office/libreoffice/Dockerfile
    command: runtime-probe
    network_mode: none
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=512m,mode=1777,uid=10001,gid=10001
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 256
    mem_limit: 2g
    cpus: 2
    profiles:
      - office

  office-source-fetch:
    image: xlsliberator-office-source-builder:26.2.4.2
    build:
      context: .
      dockerfile: docker/office/source-build/Dockerfile
    environment:
      XLSLIBERATOR_OFFICE_BUILD_CONTAINER: "1"
      XLSLIBERATOR_SOURCE_BUILD_CONTAINER: "1"
    volumes:
      - .:/workspace:ro
      - office-source-work:/office-work
      - ./artifacts:/office-artifacts
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 1024
    mem_limit: 8g
    cpus: 4
    profiles:
      - office-source

  office-source-build:
    extends: office-source-fetch
    network_mode: none

  xlsliberator-web:
    image: xlsliberator-app:0.1.0
    build: .
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      XLSLIBERATOR_DATA_DIR: /data
      XLSLIBERATOR_OPEN_SWE_URL: ${XLSLIBERATOR_OPEN_SWE_URL:-}
      XLSLIBERATOR_OPEN_SWE_TOKEN: ${XLSLIBERATOR_OPEN_SWE_TOKEN:-}
      XLSLIBERATOR_OPEN_SWE_OWNER_ID: ${XLSLIBERATOR_OPEN_SWE_OWNER_ID:-xlsliberator-web}
      XLSLIBERATOR_OPEN_SWE_POLL_SECONDS: ${XLSLIBERATOR_OPEN_SWE_POLL_SECONDS:-1}
      XLSLIBERATOR_OPEN_SWE_REQUEST_TIMEOUT_SECONDS: ${XLSLIBERATOR_OPEN_SWE_REQUEST_TIMEOUT_SECONDS:-60}
      XLSLIBERATOR_OPEN_SWE_JOB_TIMEOUT_SECONDS: ${XLSLIBERATOR_OPEN_SWE_JOB_TIMEOUT_SECONDS:-3600}
      XLSLIBERATOR_MAX_UPLOAD_MB: "64"
      XLSLIBERATOR_WEB_WORKERS: "1"
      XLSLIBERATOR_JOB_RETENTION_HOURS: "24"
    volumes:
      - xlsliberator-data:/data
    restart: unless-stopped

  # Trusted local MCP orchestration boundary. The container may create office
  # jobs, but the published endpoint remains host-loopback-only and disposable
  # workbook/runtime containers never receive the Docker socket.
  xlsliberator-mcp:
    image: xlsliberator-app:0.1.0
    build: .
    command:
      - xlsliberator
      - libreoffice-mcp-serve
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --workspace-root
      - ${PWD}/artifacts/mcp-workspace
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      XLSLIBERATOR_MCP_TRUSTED_CONTAINER_PROXY: "1"
      XLSLIBERATOR_RUNTIME_TEMP_ROOT: /runtime-tmp
      XLSLIBERATOR_DOCKER_HOST_RUNTIME_TEMP_ROOT: ${PWD}/artifacts/runtime-tmp
      XLSLIBERATOR_WORKSPACE_ROOTS: ${PWD}/artifacts/mcp-workspace
      XLSLIBERATOR_SESSION_ROOT: ${PWD}/artifacts/mcp-workspace/.sessions
    volumes:
      - ./artifacts/mcp-workspace:${PWD}/artifacts/mcp-workspace
      - ./artifacts/runtime-tmp:/runtime-tmp
      - /var/run/docker.sock:/var/run/docker.sock
    group_add:
      - "${DOCKER_GID:-0}"
    restart: unless-stopped

volumes:
  xlsliberator-data:
  office-source-work:
