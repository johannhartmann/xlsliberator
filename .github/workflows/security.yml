name: Security

on:
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    name: Scheduled dependency and code audit (Docker)
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - run: mkdir -p artifacts && chmod 0777 artifacts
      - run: docker compose build test
      - run: >-
          docker compose --profile ci-runner run --rm security-audit
          pip-audit --desc
      - run: >-
          docker compose --profile ci-runner run --rm security-audit
          bandit -r src/ -c pyproject.toml -f json -o artifacts/bandit.json
      - if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: scheduled-security-report
          path: artifacts/
          if-no-files-found: error

  secret-scan:
    name: Secret scanning
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@dcedce43c6f43de0b836d1fe38946645c9c638dc # v2
