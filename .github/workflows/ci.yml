name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    name: Static quality (Docker)
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - run: docker compose build test
      - run: docker compose run --rm test ruff format --no-cache --check --diff .
      - run: docker compose run --rm test ruff check --no-cache .
      - run: docker compose run --rm test mypy --cache-dir=/tmp/mypy-cache src/
      - run: docker compose run --rm test python -m xlsliberator.skill_validation skills

  unit:
    name: Unit tests (Python ${{ matrix.python }}, Docker)
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        include:
          - python: "3.11"
            base: python:3.11-slim@sha256:e031123e3d85762b141ad1cbc56452ba69c6e722ebf2f042cc0dc86c47c0d8b3
          - python: "3.12"
            base: python:3.12-slim@sha256:423ed6ab25b1921a477529254bfeeabf5855151dc2c3141699a1bfc852199fbf
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - run: mkdir -p artifacts && chmod 0777 artifacts
      - name: Build pinned test image
        run: >-
          docker build --file docker/test/Dockerfile
          --build-arg PYTHON_BASE=${{ matrix.base }}
          --tag xlsliberator-test:py${{ matrix.python }} .
      - name: Run office-free unit suite in Docker
        run: >-
          docker run --rm --network none --read-only
          --tmpfs /tmp:rw,noexec,nosuid,size=1g,mode=1777
          --volume "$PWD:/workspace" --workdir /workspace
          xlsliberator-test:py${{ matrix.python }}
          pytest -p no:cacheprovider -m "not integration"
          --junitxml=artifacts/pytest-unit-${{ matrix.python }}.xml
      - if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: unit-${{ matrix.python }}
          path: artifacts/
          if-no-files-found: error

  corpus:
    name: Blocking conformance corpus (Docker)
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - run: docker compose build test
      - name: Verify corpus, minimizer, fuzz accounting, and release fail-closed behavior
        run: >-
          docker compose run --rm test pytest -p no:cacheprovider -q
          tests/unit/test_conformance_corpus.py
          tests/unit/test_demo_corpus.py
          tests/unit/test_repair_promotion.py
          tests/unit/test_capability_matrix.py
      - name: Validate PR demo subset and generate not-measured capability report
        run: |
          mkdir -p artifacts/corpus && chmod 0777 artifacts/corpus
          docker compose run --rm test xlsliberator demo-corpus-validate
          docker compose run --rm test xlsliberator demo-corpus-search \
            --query "" --subset pr > artifacts/corpus/pr-subset.json
          docker compose run --rm test xlsliberator demo-corpus-report \
            --results tests/corpus/manifests/not-run-results.json \
            --output artifacts/corpus/demo-capabilities.json

  office-integration:
    name: LibreOffice 26.2.4.2 Docker integration
    needs: [quality, unit, corpus]
    runs-on: ubuntu-24.04
    timeout-minutes: 40
    env:
      XLSLIBERATOR_FAIL_ON_SKIP: "1"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - run: mkdir -p artifacts/runtime-tmp artifacts/ci && chmod -R 0777 artifacts
      - name: Build Docker orchestrator with retained logs
        run: |
          set -o pipefail
          docker compose --profile ci-orchestrator build test-orchestrator \
            2>&1 | tee artifacts/ci/office-build.log
      - name: Run Docker-contained orchestrator and disposable office jobs
        run: |
          set -o pipefail
          docker compose --profile ci-orchestrator run --rm \
            test-orchestrator python tools/ci_check.py office \
            2>&1 | tee artifacts/ci/office-integration.log
      - if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: office-integration-evidence
          path: |
            artifacts/
            **/*.evidence/
          if-no-files-found: error

  interactive-showcase:
    name: Interactive game GUI showcase
    needs: [quality, unit, corpus]
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    env:
      XLSLIBERATOR_FAIL_ON_SKIP: "1"
      XLSLIBERATOR_SHOWCASE_ARTIFACT_DIR: ${{ github.workspace }}/artifacts/showcase-ci
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - run: mkdir -p artifacts/runtime-tmp artifacts/showcase-ci && chmod -R 0777 artifacts
      - name: Build pinned stock and GUI LibreOffice images
        run: |
          set -o pipefail
          docker compose --profile office build libreoffice-runtime \
            2>&1 | tee artifacts/showcase-ci/stock-image-build.log
          docker compose --profile office-gui build libreoffice-gui-runtime \
            2>&1 | tee artifacts/showcase-ci/gui-image-build.log
      - name: Build trusted Docker orchestrator
        run: >-
          docker compose --profile ci-orchestrator build test-orchestrator
      - name: Run five public source-derived GUI scenarios
        run: |
          set -o pipefail
          docker compose --profile ci-orchestrator run --rm \
            test-orchestrator pytest -p no:cacheprovider -q \
            tests/it/test_interactive_game_showcase.py \
            --junitxml=artifacts/showcase-ci/pytest.xml \
            2>&1 | tee artifacts/showcase-ci/runtime.log
      - name: Kill source-derived engine mutants without changing the oracle
        run: |
          set -o pipefail
          docker compose --profile ci-orchestrator run --rm \
            test-orchestrator python \
            -m xlsliberator.interactive_game_mutation \
            --repository-root /workspace \
            --output /workspace/artifacts/showcase-ci/mutation \
            2>&1 | tee artifacts/showcase-ci/mutation.log
      - if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: interactive-showcase-evidence
          path: artifacts/showcase-ci/
          if-no-files-found: error

  docker-web:
    name: Docker web smoke
    needs: quality
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    env:
      DOCKER_TESTS: "1"
      XLSLIBERATOR_FAIL_ON_SKIP: "1"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - run: mkdir -p artifacts/runtime-tmp artifacts/ci && chmod -R 0777 artifacts
      - name: Build Docker web orchestrator with retained logs
        run: |
          set -o pipefail
          docker compose --profile ci-orchestrator build test-orchestrator \
            2>&1 | tee artifacts/ci/docker-web-build.log
      - name: Run blocking Docker web smoke
        run: |
          set -o pipefail
          docker compose --profile ci-orchestrator run --rm \
            test-orchestrator python tools/ci_check.py docker-web \
            2>&1 | tee artifacts/ci/docker-web.log
      - name: Remove transient nested-Docker test files
        if: always()
        run: sudo rm -rf artifacts/ci/docker-web-tmp
      - if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: docker-web
          path: |
            artifacts/ci/docker-web-build.log
            artifacts/ci/docker-web.log
            artifacts/ci/docker-web-attestation.json
            artifacts/ci/pytest-docker-web.xml
          if-no-files-found: error

  package:
    name: Build package in Docker
    needs: quality
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - run: mkdir -p artifacts/ci dist && chmod -R 0777 artifacts dist
      - run: docker compose build test
      - run: docker compose run --rm test python tools/ci_check.py package
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  security:
    name: Security checks (Docker)
    needs: quality
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - run: mkdir -p artifacts/ci && chmod -R 0777 artifacts
      - run: docker compose build test
      - run: >-
          docker compose --profile ci-orchestrator run --rm security-audit
          python tools/ci_check.py security
      - name: Exercise the real container escape boundary
        run: |
          docker run --rm \
            --network none \
            --read-only \
            --cap-drop ALL \
            --security-opt no-new-privileges \
            --pids-limit 64 \
            --memory 256m \
            --cpus 1 \
            xlsliberator-test:py311 \
            sh -ec '
              test ! -e /var/run/docker.sock
              test -z "${OPENAI_API_KEY:-}${ANTHROPIC_API_KEY:-}${GITHUB_TOKEN:-}"
              if touch /etc/xlsliberator-escape 2>/dev/null; then exit 1; fi
              python -c "import socket; s=socket.socket(); s.settimeout(0.2); raise SystemExit(1 if s.connect_ex((\"1.1.1.1\", 53)) == 0 else 0)"
            '
