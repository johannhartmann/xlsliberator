name: Nightly conformance corpus

on:
  schedule:
    - cron: "17 2 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  broad-corpus:
    name: Broad deterministic and LibreOffice corpus (Docker)
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    env:
      XLSLIBERATOR_FAIL_ON_SKIP: "1"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - run: mkdir -p artifacts/runtime-tmp artifacts/corpus && chmod -R 0777 artifacts
      - run: docker compose --profile ci-orchestrator build test-orchestrator
      - name: Run deterministic generators, metamorphic tests, and minimizer
        run: >-
          docker compose --profile ci-orchestrator run --rm test-orchestrator
          pytest -q tests/unit/test_conformance_corpus.py tests/unit/test_demo_corpus.py
          tests/unit/test_capability_matrix.py
      - name: Rebuild generated demo workbooks inside Docker
        run: >-
          docker compose --profile ci-orchestrator run --rm test-orchestrator
          sh tools/build_demo_workbooks.sh
      - name: Validate and index the nightly serious episode subset
        run: |
          docker compose --profile ci-orchestrator run --rm test-orchestrator \
            xlsliberator demo-corpus-validate
          docker compose --profile ci-orchestrator run --rm test-orchestrator \
            xlsliberator demo-corpus-search --query "" --subset nightly \
            > artifacts/corpus/nightly-subset.json
      - name: Run pinned LibreOffice differential and integration matrix
        run: >-
          docker compose --profile ci-orchestrator run --rm test-orchestrator
          python tools/ci_check.py office
      - name: Generate sample bundles and machine-readable corpus trends
        run: >-
          docker compose --profile ci-orchestrator run --rm test-orchestrator
          sh -lc 'python tools/generate_certification_samples.py &&
          xlsliberator corpus-report
          --executions artifacts/certification/corpus_executions.json
          --previous docs/corpus_statistics.json
          --output artifacts/corpus/statistics.json &&
          xlsliberator demo-corpus-report
          --results tests/corpus/manifests/not-run-results.json
          --output artifacts/corpus/demo-capabilities.json'
      - if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: nightly-corpus-evidence
          path: artifacts/
          if-no-files-found: error
