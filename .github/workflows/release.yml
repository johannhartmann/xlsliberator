name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: Verify release in Docker
    runs-on: ubuntu-24.04
    timeout-minutes: 75
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - run: mkdir -p artifacts/runtime-tmp artifacts/ci dist && chmod -R 0777 artifacts dist
      - run: docker compose --profile ci-runner build test-runner security-audit
      - name: Static checks and unit tests
        run: >-
          docker compose --profile ci-runner run --rm test-runner
          python tools/ci_check.py quality
      - name: Dependency and source security checks
        run: >-
          docker compose --profile ci-runner run --rm security-audit
          python tools/ci_check.py security
      - name: Pinned LibreOffice integration
        run: >-
          docker compose --profile ci-runner run --rm test-runner
          python tools/ci_check.py office
      - name: Build package
        run: >-
          docker compose --profile ci-runner run --rm test-runner
          python tools/ci_check.py package
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-dist
          path: dist/
          if-no-files-found: error

  publish:
    name: Publish package
    if: startsWith(github.ref, 'refs/tags/v')
    needs: verify
    runs-on: ubuntu-24.04
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: release-dist
          path: dist
      - uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # release/v1
