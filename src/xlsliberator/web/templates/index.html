{% extends "base.html" %}
{% block title %}XLSLiberator Upload{% endblock %}
{% block content %}
<section class="panel">
  <h1>XLSLiberator</h1>
  <p>Upload an Excel workbook and download a LibreOffice Calc ODS file plus reports.</p>
  <form action="/jobs" method="post" enctype="multipart/form-data" class="upload-form">
    <input type="file" name="file" accept=".xls,.xlsx,.xlsm,.xlsb" required>
    <button type="submit">Convert workbook</button>
  </form>
  <p class="meta">Accepted: .xls, .xlsx, .xlsm, .xlsb. Maximum size: {{ max_upload_mb }} MB.</p>
</section>
{% endblock %}
